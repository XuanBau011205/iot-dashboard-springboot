<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IoT Vision Dashboard | yyyyyy126</title>
    <!-- Chart.js & STOMP libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <!-- Google Fonts & simple CSS reset -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03060c);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            color: #eef2ff;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        /* smooth container */
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header area with live badge */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2rem;
            gap: 1rem;
            border-bottom: 1px solid rgba(72, 187, 255, 0.3);
            padding-bottom: 1rem;
        }

        .title-section h1 {
            font-weight: 700;
            font-size: 1.9rem;
            background: linear-gradient(135deg, #FFFFFF, #80c0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .title-section h1:before {
            content: "📡";
            font-size: 2rem;
            background: none;
            -webkit-background-clip: unset;
            color: #5dade2;
        }

        .sub {
            font-size: 0.85rem;
            color: #9aa9c7;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        .status-area {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(80, 160, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #4caf50;
            box-shadow: 0 0 6px #00ffaa;
            transition: all 0.2s ease;
        }

        .led.disconnected {
            background-color: #f44336;
            box-shadow: 0 0 4px #ff5555;
        }

        .status-text {
            font-weight: 500;
        }

        /* metric cards row */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.4rem;
            margin-bottom: 2.2rem;
        }

        .metric-card {
            background: rgba(20, 28, 44, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.2rem 1rem;
            text-align: center;
            border: 1px solid rgba(72, 187, 255, 0.2);
            transition: transform 0.2s ease, border-color 0.2s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .metric-card:hover {
            border-color: #3b82f6;
            transform: translateY(-3px);
            background: rgba(28, 40, 62, 0.8);
        }

        .metric-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .metric-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            color: #b9c7e6;
        }

        .metric-value {
            font-size: 2.6rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 8px 0;
            background: linear-gradient(to right, #f0f4ff, #bbd4ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .metric-unit {
            font-size: 0.9rem;
            font-weight: 400;
            color: #8d9ed4;
        }

        /* chart panel */
        .chart-panel {
            background: rgba(12, 18, 30, 0.65);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 1rem 1rem 1.2rem 1rem;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0.8rem 0.5rem 0.8rem;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chart-title {
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: -0.2px;
            background: rgba(255,255,240,0.1);
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
        }

        .legend-note {
            font-size: 0.7rem;
            color: #8aa1d9;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 24px;
        }

        canvas {
            max-height: 450px;
            width: 100%;
            margin-top: 8px;
        }

        /* footer */
        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #5f739b;
            border-top: 1px dashed #1f2a44;
            padding-top: 1.2rem;
        }

        @media (max-width: 650px) {
            body {
                padding: 1rem;
            }
            .metric-value {
                font-size: 1.8rem;
            }
            .title-section h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <div class="title-section">
            <h1>IoT Vision Core</h1>
            <div class="sub">real‑time environment | gas, temp & humidity</div>
        </div>
        <div class="status-area" id="statusWidget">
            <div class="led" id="statusLed"></div>
            <span class="status-text" id="statusMessage">Connecting...</span>
        </div>
    </div>

    <!-- live metrics cards -->
    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-icon">🌡️</div>
            <div class="metric-label">Nhiệt độ</div>
            <div class="metric-value" id="liveTemp">--</div>
            <div class="metric-unit">°C</div>
        </div>
        <div class="metric-card">
            <div class="metric-icon">💧</div>
            <div class="metric-label">Độ ẩm</div>
            <div class="metric-value" id="liveHumi">--</div>
            <div class="metric-unit">% RH</div>
        </div>
        <div class="metric-card">
            <div class="metric-icon">🔥</div>
            <div class="metric-label">Khí Gas (lọc)</div>
            <div class="metric-value" id="liveGas">--</div>
            <div class="metric-unit">ppm</div>
        </div>
        <div class="metric-card">
            <div class="metric-icon">🕒</div>
            <div class="metric-label">Cập nhật</div>
            <div class="metric-value" id="lastUpdate" style="font-size:1.2rem; background:none; color:#b0d4ff;">--:--:--</div>
            <div class="metric-unit">giây trước</div>
        </div>
    </div>

    <!-- chart section -->
    <div class="chart-panel">
        <div class="chart-header">
            <span class="chart-title">📈 Xu hướng cảm biến</span>
            <span class="legend-note">⚡ dữ liệu real-time qua WebSocket</span>
        </div>
        <canvas id="myChart" width="800" height="400" style="width:100%; height:auto; max-height:420px"></canvas>
    </div>
    <div class="footer-note">
        🔗 Kết nối STOMP · Dữ liệu từ thiết bị · tự động cập nhật 20 điểm gần nhất
    </div>
</div>

<script>
    (function() {
        // ---- DOM elements for live cards ----
        const liveTempSpan = document.getElementById('liveTemp');
        const liveHumiSpan = document.getElementById('liveHumi');
        const liveGasSpan = document.getElementById('liveGas');
        const lastUpdateSpan = document.getElementById('lastUpdate');
        const statusLed = document.getElementById('statusLed');
        const statusMessageSpan = document.getElementById('statusMessage');

        let lastTimestamp = null;
        let lastUpdateTime = Date.now();

        function updateLiveCards(temp, humi, gas) {
            if (temp !== undefined && temp !== null) {
                liveTempSpan.innerText = typeof temp === 'number' ? temp.toFixed(1) : temp;
            }
            if (humi !== undefined && humi !== null) {
                liveHumiSpan.innerText = typeof humi === 'number' ? humi.toFixed(1) : humi;
            }
            if (gas !== undefined && gas !== null) {
                liveGasSpan.innerText = typeof gas === 'number' ? Math.round(gas) : gas;
            }
            // update relative time
            const now = Date.now();
            const secondsAgo = Math.floor((now - lastUpdateTime) / 1000);
            lastUpdateSpan.innerText = secondsAgo + 's';
            lastUpdateTime = now;
            // show clock time as tooltip alternative
            const timeStr = new Date().toLocaleTimeString('vi-VN');
            lastUpdateSpan.title = `Lần cuối: ${timeStr}`;
        }

        // Helper: set connection status (green/red)
        function setConnectionStatus(connected, msg) {
            if (connected) {
                statusLed.className = 'led';
                statusMessageSpan.innerText = msg || '● Đang trực tuyến';
            } else {
                statusLed.className = 'led disconnected';
                statusMessageSpan.innerText = msg || '⚠️ Mất kết nối';
            }
        }

        // --- CHART init (preserved core exactly, but with nicer default tooltips, responsive) ---
        const ctx = document.getElementById('myChart').getContext('2d');
        // original chart config - keep all datasets, axis same
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Start'],
                datasets: [
                    { label: '🌡️ Nhiệt độ (°C)', borderColor: '#ff5e7e', backgroundColor: 'rgba(255,94,126,0.05)', data: [0], yAxisID: 'y', tension: 0.2, pointRadius: 3, pointBackgroundColor: '#ff5e7e', borderWidth: 2 },
                    { label: '💧 Độ ẩm (%)', borderColor: '#3b9eff', backgroundColor: 'rgba(59,158,255,0.05)', data: [0], yAxisID: 'y', tension: 0.2, pointRadius: 3, pointBackgroundColor: '#3b9eff', borderWidth: 2 },
                    { label: '🔥 Khí Gas (lọc)', borderColor: '#f5b042', backgroundColor: 'rgba(245,176,66,0.05)', data: [0], yAxisID: 'y1', tension: 0.2, pointRadius: 3, pointBackgroundColor: '#f5b042', borderWidth: 2 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: { mode: 'index', intersect: false, backgroundColor: '#0f172a', titleColor: '#eef2ff', bodyColor: '#cbd5e6' },
                    legend: { labels: { color: '#cfdfed', usePointStyle: true, boxWidth: 10, font: { size: 11 } }, position: 'top' }
                },
                scales: {
                    y: { 
                        position: 'left', 
                        title: { display: true, text: '🌡️ Nhiệt độ / Độ ẩm', color: '#9ab3df', font: { weight: '500' } },
                        grid: { color: 'rgba(70, 100, 150, 0.2)' },
                        ticks: { color: '#cbdff2' }
                    },
                    y1: { 
                        position: 'right', 
                        title: { display: true, text: '🔥 Gas (ppm)', color: '#f5b042', font: { weight: '500' } },
                        grid: { drawOnChartArea: false },
                        ticks: { color: '#f5c28e' }
                    },
                    x: { ticks: { color: '#b0c2e0', maxRotation: 35, autoSkip: true }, grid: { color: 'rgba(80,100,140,0.15)' } }
                },
                elements: { line: { borderJoin: 'round' } }
            }
        });

        // --- WEBSOCKET + STOMP (preserve original path /ws, subscription, and update logic) ---
        // additionally update metric cards and last update time.
        let stompClient = null;
        let reconnectAttempts = 0;
        
        function connectWebSocket() {
            try {
                // Exactly same relative path as original
                const socket = new SockJS('/ws');
                const client = Stomp.over(socket);
                stompClient = client;
                
                // Configure heartbeat to keep connection alive
                client.heartbeat.outgoing = 10000;
                client.heartbeat.incoming = 10000;
                
                client.connect({}, function(frame) {
                    console.log("✅ Đã nối ống dẫn (STOMP)!");
                    setConnectionStatus(true, "📡 Real-time đang hoạt động");
                    reconnectAttempts = 0;
                    
                    // Subscribe to sensor topic (core subscription)
                    client.subscribe('/topic/sensor', function(message) {
                        console.log("Dữ liệu về tới trình duyệt:", message.body);
                        try {
                            const obj = JSON.parse(message.body);
                            // data structure: obj.data.temp, obj.data.humi, obj.data.gas_filtered
                            if (obj && obj.data) {
                                const tempVal = obj.data.temp;
                                const humiVal = obj.data.humi;
                                const gasVal = obj.data.gas_filtered;
                                
                                // update live cards with fresh numbers
                                updateLiveCards(tempVal, humiVal, gasVal);
                                
                                const now = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute:'2-digit', second:'2-digit' });
                                
                                // ----- CORE CHART LOGIC (identical shift & push) -----
                                // Ensure max 20 points behavior
                                if (myChart.data.labels.length > 20) {
                                    myChart.data.labels.shift();
                                    myChart.data.datasets.forEach(d => d.data.shift());
                                }
                                myChart.data.labels.push(now);
                                // dataset order: 0: temp, 1: humi, 2: gas
                                myChart.data.datasets[0].data.push(tempVal);
                                myChart.data.datasets[1].data.push(humiVal);
                                myChart.data.datasets[2].data.push(gasVal);
                                myChart.update();
                            } else {
                                console.warn("Dữ liệu không đúng cấu trúc:", obj);
                            }
                        } catch(e) {
                            console.error("Lỗi parse JSON hoặc cập nhật chart:", e);
                        }
                    });
                }, function(error) {
                    console.error("❌ Lỗi kết nối WebSocket/STOMP:", error);
                    setConnectionStatus(false, "🔌 Mất kết nối - đang thử lại...");
                    attemptReconnect();
                });
                
                // handle connection lost on socket close
                client.onclose = function() {
                    console.warn("STOMP connection closed");
                    setConnectionStatus(false, "🔁 Ngắt kết nối, thử kết nối lại...");
                    attemptReconnect();
                };
                
            } catch (err) {
                console.error("Lỗi khởi tạo SockJS:", err);
                setConnectionStatus(false, "⚠️ Lỗi khởi tạo websocket");
                attemptReconnect();
            }
        }
        
        function attemptReconnect() {
            if (stompClient && stompClient.connected) return;
            setTimeout(() => {
                console.log("🔄 Đang thử kết nối lại WebSocket...");
                connectWebSocket();
            }, 3000);
        }
        
        // start connection
        connectWebSocket();
        
        // Optional: keep last update timestamp for 'seconds ago' dynamic ticker
        setInterval(() => {
            // update relative time display every second (only if lastUpdateTime exists)
            if (lastUpdateTime) {
                const secondsElapsed = Math.floor((Date.now() - lastUpdateTime) / 1000);
                if (lastUpdateSpan) lastUpdateSpan.innerText = secondsElapsed + 's';
            }
        }, 1000);
        
        // initial card placeholder values
        liveTempSpan.innerText = '--';
        liveHumiSpan.innerText = '--';
        liveGasSpan.innerText = '--';
        lastUpdateSpan.innerText = '0s';
        
        // additional: small demo for chart initial sync (just placeholder)
        console.log("IoT Dashboard sẵn sàng - giao diện nâng cao nhưng giữ nguyên lõi WebSocket/STOMP");
    })();
</script>
</body>
</html>
